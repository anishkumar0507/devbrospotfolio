<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="devbrosGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Logo text -->
  <text
    x="50%"
    y="55%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="80"
    font-weight="bold"
    fill="url(#devbrosGradient)"
    filter="url(#glow)"
    opacity="0.9"
  >
    Dev Bro's
  </text>

  <!-- Subtext -->
  <text
    x="50%"
    y="80%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="24"
    fill="#94a3b8"
    opacity="0.6"
  >
    The Developer's
  </text>

</svg>